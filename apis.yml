      - type: ProductPage
        url: https://performancestudio.geniussports.com/
      - type: Authentication
        url: https://secondspectrum.auth0.com/
        title: Auth0-backed login
  - aid: second-spectrum:tracking-data
    name: Second Spectrum Tracking Data
    description: >-
      Skeletal and optical tracking data feed produced from in-venue
      computer vision systems for football and basketball. Delivered to
      leagues, clubs, and broadcasters under enterprise agreement; the
      Premier League and Football DataCo cite Second Spectrum as their
      football tracking technology.
    humanURL: https://geniussports.com/
    baseURL: https://geniussports.com/

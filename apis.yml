description: >-
  Second Spectrum, acquired by Genius Sports in 2021, is a sports tracking
  and AI media company supplying skeletal tracking, computer vision, and
  augmented broadcast products for major leagues including the NBA and the
  Premier League. The customer-facing offering is the Performance Studio
  platform; data and integration access are delivered under enterprise
  agreement rather than a self-serve developer portal.
apis:
  - aid: second-spectrum:performance-studio
    name: Performance Studio
    description: >-
      Customer-facing platform delivering Second Spectrum tracking data,
      visualizations, and clips to club analysts and coaching staff.
      Access is gated by Auth0-backed login under the Genius Sports
      Performance Studio domain.
    humanURL: https://performancestudio.geniussports.com/
    baseURL: https://performancestudio.geniussports.com
    tags:

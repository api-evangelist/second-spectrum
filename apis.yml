description: >-
  Second Spectrum is a Los Angeles–based computer vision and AI sports
  tracking company, acquired by Genius Sports in 2021 for roughly $200M.
  It supplies skeletal and optical tracking, machine-learning analytics,
  and augmented broadcast products to major leagues, clubs, and
  broadcasters — most notably the NBA (official tracking partner from
  2017 to 2023), the Premier League (official tracking partner via
  Football DataCo), and MLS. The customer-facing offering is the
  Performance Studio platform, used by club analysts and coaching staff
  to access tracking data, visualizations, and tagged clips. There is no
  public developer portal, no published OpenAPI, and no self-serve API
  keys; data and integration access are delivered exclusively under
  enterprise agreement with Genius Sports. The product surface is
  effectively a sales-led, league/club-tier offering rather than a
  developer API.
